name: Tobacco Risk Classification — CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  DAGSHUB_TOKEN:    ${{ secrets.DAGSHUB_TOKEN }}
  DOCKER_IMAGE:     RFer7935/mlops-experiment

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test & Preprocess
  # ─────────────────────────────────────────────
  test-and-preprocess:
    name: Test & Preprocess
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run preprocessing
        run: python preprocessing/preprocess.py

      - name: Upload preprocessed artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-data
          path: preprocessing/tobacco_preprocessed/preprocessed.csv

  # ─────────────────────────────────────────────
  # JOB 2: Train & Log to DagsHub
  # ─────────────────────────────────────────────
  train-and-log:
    name: Train & Log to DagsHub MLflow
    runs-on: ubuntu-latest
    needs: test-and-preprocess

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download preprocessed data
        uses: actions/download-artifact@v4
        with:
          name: preprocessed-data
          path: Workflow-CI/MLProject/tobacco_preprocessed/

      - name: Train model & log to DagsHub
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/MLOps-Experiment.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd Workflow-CI/MLProject
          python modelling.py \
            --data_path tobacco_preprocessed/preprocessed.csv \
            --n_estimators 100 \
            --max_depth 10 \
            --min_samples_split 2

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: Workflow-CI/MLProject/outputs/rf_model.pkl

  # ─────────────────────────────────────────────
  # JOB 3: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push-docker:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest
    needs: train-and-log

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: Workflow-CI/MLProject/outputs/

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: RFer7935
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest \
                       -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
